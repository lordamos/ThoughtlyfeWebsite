name: Sync to sumthin3lse-creator

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to sumthin3lse-creator/ThoughtlyfeWebsite
        env:
          SC_TOKEN: ${{ secrets.SC_SYNC_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add sc-mirror "https://x-access-token:${SC_TOKEN}@github.com/sumthin3lse-creator/ThoughtlyfeWebsite.git"
          git push sc-mirror main --force
